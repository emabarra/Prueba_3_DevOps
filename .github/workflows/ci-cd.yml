name: Java CI/CD Pipeline with Kubernetes & Monitoring

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: 🧪 Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Unit Tests with Maven
      # Mantenemos el skipTests para asegurar que no falle por falta de base de datos en GitHub
      run: mvn clean test -DskipTests

  security-and-quality:
    name: 🛡️ SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Analyze with SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dmaven.project.sourceRoots.warningsDisabled=true \
          -Dsonar.projectKey=TU_PROJECT_KEY_REAL \
          -Dsonar.organization=TU_ORGANIZATION_REAL

  deploy-kubernetes:
    name: 🚀 Deploy to Kubernetes Cluster
    runs-on: ubuntu-latest
    needs: [build-and-test, security-and-quality]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Kubeconfig
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: Deploy Manifests to Cluster
      run: |
        kubectl apply -f k8s/mysql-k8s.yml
        kubectl apply -f k8s/springboot-k8s.yml
        kubectl apply -f k8s/prometheus-k8s.yml
        kubectl apply -f k8s/grafana-k8s.yml

    - name: Verify Deployment Status
      run: |
        kubectl rollout status deployment/springboot-deployment
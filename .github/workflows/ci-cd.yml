name: Java CI/CD Pipeline with Kubernetes & Monitoring

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: 🧪 Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Unit Tests with Maven
      run: mvn clean test -DskipTests

  deploy-kubernetes:
    name: 🚀 Deploy to Kubernetes Cluster
    runs-on: ubuntu-latest
    needs: build-and-test 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Kubeconfig
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: Deploy Manifests to Cluster
      run: |
        kubectl apply -f k8s/mysql-k8s.yml
        kubectl apply -f k8s/springboot-k8s.yml
        kubectl apply -f k8s/prometheus-k8s.yml
        kubectl apply -f k8s/grafana-k8s.yml

    - name: Verify Deployment Status
      run: |
        kubectl rollout status deployment/springboot-deployment